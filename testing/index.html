<!DOCTYPE html>
<html>
<head>
    <title>My Chores App</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
            <style>
                    body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
                            .card { background: white; padding: 20px; margin: 20px auto; max-width: 300px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
                                    button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
                                            button:active { background-color: #0056b3; }
                                                </style>
                                                </head>
                                                <body>
                                                    <h1>Current Chores</h1>
                                                        
                                                            <div class="card">
                                                                    <h3>Loading Dishwasher</h3>
                                                                            <p>Status: <span style="color: orange; font-weight: bold;">Pending</span></p>
                                                                                    <button onclick="alert('Great job! Mark as done.')">Mark Complete</button>
                                                                                        </div>

                                                                                            <div class="card">
                                                                                                    <h3>Vacuuming</h3>
                                                                                                            <p>Status: <span style="color: green; font-weight: bold;">Done</span></p>
                                                                                                                </div>
                                                                                                                </body>
                                                                                                                </html>
